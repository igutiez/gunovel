{% extends "base.html" %}
{% block title %}Novela App{% endblock %}
{% block head %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
  <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js" defer></script>
{% endblock %}
{% block body %}
<header class="topbar">
  <div class="topbar-left">
    <label for="proyecto-select" class="sr-only">Proyecto</label>
    <select id="proyecto-select" aria-label="Proyecto"></select>
    <button id="btn-nueva-novela" type="button" class="btn-mini btn-nuevo" title="Crear una novela nueva">+ Novela</button>
    <button id="btn-nueva-saga" type="button" class="btn-mini btn-nuevo" title="Crear una saga">+ Saga</button>
    <button id="btn-nuevo-libro" type="button" class="btn-mini btn-nuevo" title="Añadir libro a la saga activa" style="display:none">+ Libro</button>
    <button id="btn-exportar-epub" type="button" class="btn-mini btn-nuevo" title="Exportar EPUB">⤓ EPUB</button>
    <button id="btn-configurar-remoto" type="button" class="btn-mini btn-nuevo" title="Configurar push a Git remoto">Git remoto</button>
    <button id="btn-deshacer" type="button" class="btn-mini btn-nuevo" title="Revertir el último commit">↶ Deshacer</button>
    <button id="btn-autonomo" type="button" class="btn-mini btn-nuevo btn-autonomo-top" title="Modo autónomo con el orquestador interno">🤖 Autónomo</button>
    <button id="btn-cc" type="button" class="btn-mini btn-nuevo btn-autonomo-top" style="background:linear-gradient(90deg,#e37400,#e4b73b)" title="Modo autónomo con Claude Code (CLI de Anthropic): más potente, planning nativo, subagentes">⚡ Claude Code</button>
  </div>
  <div class="topbar-center">
    <span id="git-indicator" class="sync-dot sync-unknown" title="Estado de sincronización Git"></span>
    <span id="git-label">—</span>
  </div>
  <div class="topbar-right">
    <span class="user-name">{{ username }}</span>
    <form method="post" action="{{ url_for('auth.logout') }}">
      <button type="submit" class="linklike">Salir</button>
    </form>
  </div>
</header>

<main class="layout">
  <aside id="arbol" class="panel panel-arbol" aria-label="Árbol del proyecto">
    <div class="panel-header">Árbol</div>
    <div id="arbol-contenido" class="panel-body"></div>
  </aside>

  <section id="workspace" class="panel panel-workspace" aria-label="Espacio de trabajo">
    <div class="panel-header">
      <span id="workspace-titulo">— selecciona un fichero —</span>
      <span class="workspace-right">
        <span id="workspace-contador" class="contador-palabras"></span>
        <span id="workspace-estado" class="estado-guardado"></span>
        <span class="workspace-modos">
          <button type="button" class="btn-modo activo" data-modo="editor">Editor</button>
          <button type="button" class="btn-modo" data-modo="historial">Historial</button>
          <button type="button" class="btn-modo" data-modo="auditoria">Auditoría</button>
          <button type="button" class="btn-modo" data-modo="audit">Audit</button>
        </span>
      </span>
    </div>
    <div class="panel-body">
      <div id="modo-editor" class="modo-panel activo"><textarea id="editor"></textarea></div>
      <div id="modo-historial" class="modo-panel"></div>
      <div id="modo-auditoria" class="modo-panel"></div>
      <div id="modo-audit" class="modo-panel"></div>
    </div>
  </section>

  <aside id="chat" class="panel panel-chat" aria-label="Chat IA">
    <div class="panel-header">
      <span>Chat IA</span>
      <select id="modelo-select" class="modelo-select" title="Modelo de IA">
        <option value="">Sonnet (default)</option>
        <option value="claude-haiku-4-5">Haiku · rápido y barato</option>
        <option value="claude-sonnet-4-6">Sonnet · redacción</option>
        <option value="claude-opus-4-7">Opus · revisión editorial</option>
      </select>
      <span id="chat-coste" class="coste-badge">0 €</span>
    </div>
    <div id="chat-mensajes" class="panel-body chat-mensajes"></div>
    <form id="chat-form" class="chat-form">
      <textarea id="chat-input" rows="3" placeholder="Mensaje para la IA (Cmd/Ctrl+Enter)"></textarea>
      <button type="submit" id="chat-enviar">Enviar</button>
    </form>
  </aside>
</main>

<script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
{% endblock %}
